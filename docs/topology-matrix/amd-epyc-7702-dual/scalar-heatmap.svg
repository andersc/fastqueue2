<svg xmlns="http://www.w3.org/2000/svg" width="217" height="294" viewBox="0 0 217 294" role="img" aria-label="Scalar API — directed CPU-pair throughput">
<style>text{font-family:ui-sans-serif,system-ui,sans-serif;fill:#172033}.title{font-size:22px;font-weight:700}.subtitle{font-size:12px;fill:#475569}.axis{font-size:11px;font-weight:600}.tick{font-size:10px;fill:#475569}.note{font-size:10px;fill:#64748b}.legend-label{font-size:11px;font-weight:600}</style>
<rect width="100%" height="100%" fill="#ffffff"/>
<defs><linearGradient id="throughput-rainbow" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#0000ff"/><stop offset="20%" stop-color="#00bfff"/><stop offset="40%" stop-color="#00ff00"/><stop offset="60%" stop-color="#ffff00"/><stop offset="80%" stop-color="#ff7f00"/><stop offset="100%" stop-color="#ff0000"/></linearGradient><pattern id="self-pair" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="8" height="8" fill="#dbe3ee"/><line x1="0" y1="0" x2="0" y2="8" stroke="#94a3b8" stroke-width="3"/></pattern></defs>
<text x="28" y="32" class="title">Scalar API — directed CPU-pair throughput</text>
<text x="28" y="53" class="subtitle">Rows: producer CPU · columns: consumer CPU · each cell: median M items/s. hard Linux logical-CPU pinning.</text>
<text x="137.0" y="70" text-anchor="middle" class="axis">Consumer logical CPU →</text>
<text x="22" y="144.0" transform="rotate(-90 22 144.0)" text-anchor="middle" class="axis">Producer logical CPU →</text>
<text x="113.0" y="104" text-anchor="middle" class="tick">0</text>
<text x="98" y="123.0" text-anchor="end" class="tick">0</text>
<text x="129.0" y="104" text-anchor="middle" class="tick">1</text>
<text x="98" y="139.0" text-anchor="end" class="tick">1</text>
<text x="145.0" y="104" text-anchor="middle" class="tick">2</text>
<text x="98" y="155.0" text-anchor="end" class="tick">2</text>
<text x="161.0" y="104" text-anchor="middle" class="tick">3</text>
<text x="98" y="171.0" text-anchor="end" class="tick">3</text>
<rect x="105" y="112" width="16.1" height="16.1" fill="url(#self-pair)"><title>CPU 0 → itself: excluded by benchmark design</title></rect>
<rect x="121" y="112" width="16.1" height="16.1" fill="rgb(0,0,255)"><title>Producer CPU 0 → consumer CPU 1: median 296.700 M items/s</title></rect>
<rect x="137" y="112" width="16.1" height="16.1" fill="rgb(255,6,0)"><title>Producer CPU 0 → consumer CPU 2: median 300.622 M items/s</title></rect>
<rect x="153" y="112" width="16.1" height="16.1" fill="rgb(255,205,0)"><title>Producer CPU 0 → consumer CPU 3: median 299.385 M items/s</title></rect>
<rect x="105" y="128" width="16.1" height="16.1" fill="rgb(0,231,97)"><title>Producer CPU 1 → consumer CPU 0: median 297.983 M items/s</title></rect>
<rect x="121" y="128" width="16.1" height="16.1" fill="url(#self-pair)"><title>CPU 1 → itself: excluded by benchmark design</title></rect>
<rect x="137" y="128" width="16.1" height="16.1" fill="rgb(255,189,0)"><title>Producer CPU 1 → consumer CPU 2: median 299.482 M items/s</title></rect>
<rect x="153" y="128" width="16.1" height="16.1" fill="rgb(195,255,0)"><title>Producer CPU 1 → consumer CPU 3: median 298.889 M items/s</title></rect>
<rect x="105" y="144" width="16.1" height="16.1" fill="rgb(255,0,0)"><title>Producer CPU 2 → consumer CPU 0: median 300.660 M items/s</title></rect>
<rect x="121" y="144" width="16.1" height="16.1" fill="rgb(0,230,99)"><title>Producer CPU 2 → consumer CPU 1: median 297.975 M items/s</title></rect>
<rect x="137" y="144" width="16.1" height="16.1" fill="url(#self-pair)"><title>CPU 2 → itself: excluded by benchmark design</title></rect>
<rect x="153" y="144" width="16.1" height="16.1" fill="rgb(255,191,0)"><title>Producer CPU 2 → consumer CPU 3: median 299.470 M items/s</title></rect>
<rect x="105" y="160" width="16.1" height="16.1" fill="rgb(255,143,0)"><title>Producer CPU 3 → consumer CPU 0: median 299.768 M items/s</title></rect>
<rect x="121" y="160" width="16.1" height="16.1" fill="rgb(0,218,148)"><title>Producer CPU 3 → consumer CPU 1: median 297.823 M items/s</title></rect>
<rect x="137" y="160" width="16.1" height="16.1" fill="rgb(255,215,0)"><title>Producer CPU 3 → consumer CPU 2: median 299.321 M items/s</title></rect>
<rect x="153" y="160" width="16.1" height="16.1" fill="url(#self-pair)"><title>CPU 3 → itself: excluded by benchmark design</title></rect>
<text x="105" y="212" class="legend-label">Median throughput (M items/s)</text>
<rect x="105" y="220" width="64" height="16" rx="2" fill="url(#throughput-rainbow)" stroke="#475569"/>
<line x1="105" y1="236" x2="105" y2="241" stroke="#334155"/>
<text x="105" y="255" text-anchor="middle" class="tick">297</text>
<line x1="121.0" y1="236" x2="121.0" y2="241" stroke="#334155"/>
<text x="121.0" y="255" text-anchor="middle" class="tick">298</text>
<line x1="137.0" y1="236" x2="137.0" y2="241" stroke="#334155"/>
<text x="137.0" y="255" text-anchor="middle" class="tick">299</text>
<line x1="153.0" y1="236" x2="153.0" y2="241" stroke="#334155"/>
<text x="153.0" y="255" text-anchor="middle" class="tick">300</text>
<line x1="169" y1="236" x2="169" y2="241" stroke="#334155"/>
<text x="169" y="255" text-anchor="middle" class="tick">301</text>
<text x="105" y="271" class="note">Slowest = blue · fastest = red · linear scale for this view</text>
<rect x="197" y="222" width="14" height="14" fill="url(#self-pair)"/><text x="217" y="234" class="note">self pair excluded</text>
</svg>